services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://110.239.80.161:8000}
    ports:
      - "3000:3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET:-change-me-in-production}
      - AUTH_TRUST_HOST=true
      - DATABASE_URL=file:/app/data/prod.db
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  sqlite_data:
